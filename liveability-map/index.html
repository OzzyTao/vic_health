<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Liveability Map — Scenario Comparison</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  </head>
  <body>
    <!-- Error banner -->
    <div id="error-banner" role="alert"></div>

    <!-- Toolbar: indicator + scenario selectors -->
    <div id="toolbar" class="toolbar">
      <div id="indicator-selector" class="toolbar__group"></div>
      <div id="left-scenario-selector" class="toolbar__group"></div>
      <div id="right-scenario-selector" class="toolbar__group"></div>
    </div>

    <!-- Side-by-side map panes -->
    <div class="map-comparison">
      <div class="map-pane">
        <div class="map-pane__label" id="label-left">Original</div>
        <div id="map-left" class="map-pane__map"></div>
      </div>
      <div class="map-pane">
        <div class="map-pane__label" id="label-right">Liveability</div>
        <div id="map-right" class="map-pane__map"></div>
      </div>
    </div>

    <!-- Shared legend -->
    <div id="legend" class="legend-container"></div>

    <!-- Detail panel (click-to-inspect) -->
    <div id="detail-panel" class="detail-panel" aria-live="polite" aria-label="Meshblock detail panel"></div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
